services:
  postgres:
    image: postgres:15
    container_name: mt_poc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mt_poc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-mt_poc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mt_poc} -d ${POSTGRES_DB:-mt_poc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mt_poc_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mt_poc_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - mt_poc_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt_poc_api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-mt_poc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-mt_poc}
      API_KEYS: ${API_KEYS:-test-key-1,test-key-2}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mt_poc_network

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt_poc_dashboard
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-mt_poc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-mt_poc}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mt_poc_network

networks:
  mt_poc_network:
    driver: bridge

volumes:
  postgres_data:
