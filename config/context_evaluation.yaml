# Context Evaluation Configuration
# Defines fuzzy membership functions for markers and context assumptions

marker_memberships:
  people_in_room:  # Natural scale: 0-10 count
    low:
      type: triangular
      params: [0, 1, 2]
    medium:
      type: triangular
      params: [1, 3, 5]
    high:
      type: trapezoidal
      params: [4, 7, 10, 10]

  network_activity_level:
    low:
      type: triangular
      params: [0, 0.2, 0.5]
    medium:
      type: triangular
      params: [0.4, 0.5, 0.7]
    high:
      type: triangular
      params: [0.6, 1.0, 1.0]

  door_open_events:
    low:
      type: triangular
      params: [ 0, 0, 2 ]
    medium:
      type: triangular
      params: [ 1, 3, 5 ]
    high:
      type: trapezoidal
      params: [ 4, 6, 10, 10 ]

  ambient_noise:
    low:
      type: triangular
      params: [0, 0.2, 0.5]
    medium:
      type: triangular
      params: [0.4, 0.5, 0.7]
    high:
      type: triangular
      params: [0.6, 1.0, 1.0]

  audio_source_digital:  # Whether detected audio originates from digital sources (speakers, headphones, gaming)
    low:
      type: triangular
      params: [0, 0.2, 0.5]
    medium:
      type: triangular
      params: [0.4, 0.5, 0.7]
    high:
      type: triangular
      params: [0.6, 1.0, 1.0]

context_assumptions:

  solitary_digital:
    conditions:
      people_in_room:
        set: low
        weight: 0.3
      network_activity_level:
        set: high
        weight: 0.3
      door_open_events:
        set: low
        weight: 0.1
      ambient_noise:
        set: low
        weight: 0.15
      audio_source_digital:
        set: low
        weight: 0.15
    operator: WEIGHTED_MEAN

  adversarial_social_digital_gaming:
    conditions:
      people_in_room:
        set: low
        weight: 0.3
      network_activity_level:
        set: high
        weight: 0.3
      door_open_events:
        set: low
        weight: 0.1
      ambient_noise:
        set: high
        weight: 0.15
      audio_source_digital:
        set: high
        weight: 0.15
    operator: WEIGHTED_MEAN

  neutral:
    threshold: 0.3
