# Episode Decision Configuration
# Based on DSM-5 Major Depressive Disorder criteria
#
# Episode Formula (per paper Equation 4.17):
#   Episode_likely = (SUM present_k >= min_indicators) AND (core1 OR core2)

# Minimum indicators required for episode (DSM-5: >=5 of 9)
min_indicators: 5

# Core symptom indicators (at least one must be present)
# DSM-5 requires either depressed mood or loss of interest
core_indicators:
  - 1_depressed_mood
  - 2_loss_of_interest

# Number of consecutive windows for daily likelihood peak detection.
# Daily likelihood = max mean of any k consecutive windows in the day.
# With 15-min windows, k=4 means "worst contiguous hour of the day".
peak_window_k: 8
