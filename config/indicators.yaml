# Indicator Definitions for MDD Analysis (DSM-5)
# 9 indicators with 29 unique biomarkers from evaluation 2.1
#
# Direction handling:
#   - higher_is_worse: HIGH raw values indicate concern (symptom-descriptive names)
#   - lower_is_worse: LOW raw values indicate concern (measurement-descriptive names)
#
# Weights are equal across biomarkers per indicator for simplicity.
# Future work: tune based on empirical testing and expert input.

1_depressed_mood:
  biomarkers:
    whispering:
      type: speech
      weight: 0.25
      direction: higher_is_worse
    prolonged_pauses:
      type: speech
      weight: 0.25
      direction: higher_is_worse
    reduced_social_interaction:
      type: network
      weight: 0.25
