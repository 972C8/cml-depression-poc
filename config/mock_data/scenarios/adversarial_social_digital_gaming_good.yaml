# Scenario: Adversarial with audio_source_digital parameter
# Same physical conditions as adversarial_social_digital_gaming, but the
# additional audio_source_digital marker allows the system to recognise
# that ambient noise originates from digital sources (gaming audio,
# voice chat through speakers) rather than physical human presence.
# Expected result: solitary_digital context detected.
name: adversarial social digital gaming (with audio_source_digital)
description: "Young adult alone in room playing games online with friends. Additional audio_source_digital parameter enables correct solitary_digital detection despite high ambient noise."
schedule:
  active_hours:
    start: 20
    end: 24
  day_pattern:
    days_on: 2
    days_off: 1
    offset: 1
overrides:
  context:
    people_in_room:
      baseline: 1
      variance: 0
      max_value: 1
      enforce_integer_value: true
    ambient_noise: # high — same as adversarial scenario
      baseline: 0.5
      variance: 0.1
    network_activity_level:
      baseline: 0.9
      variance: 0.1
    door_open_events:
      baseline: 1
      variance: 1
      max_value: 1
      enforce_integer_value: true
    audio_source_digital: # NEW — indicates noise is from digital sources
      baseline: 0.1
      variance: 0.1
  biomarkers:
    network:
      reduced_social_interaction:
        baseline: 0.6
        variance: 0.2
        daily_cycle: false
      passive_media_binge:
        baseline: 0.6
        variance: 0.2
        daily_cycle: false
      shrinking_domain_diversity:
        baseline: 0.6
        variance: 0.2
        daily_cycle: false
      reduced_interactive_engagement:
        baseline: 0.6
        variance: 0.2
        daily_cycle: false
      food_ordering_pattern_shift:
        baseline: 0.6
        variance: 0.2
        daily_cycle: false
      calorie_nutrition_information_seeking:
